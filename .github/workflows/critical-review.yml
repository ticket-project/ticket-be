name: Critical Section Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master, main]

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze:
    name: 크리티컬 섹션 분석
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install js-yaml
        run: npm install js-yaml

      - name: Analyze and comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const yaml = require('js-yaml');
            const config = yaml.load(fs.readFileSync('.github/critical-sections.yml', 'utf8'));

            // ── 1. 변경 파일 목록 가져오기 ──
            const files = [];
            let page = 1;
            while (true) {
              const resp = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                per_page: 100,
                page,
              });
              files.push(...resp.data);
              if (resp.data.length < 100) break;
              page++;
            }

            // ── 2. 파일별 크리티컬 여부 판정 ──
            function matchGlob(pattern, filepath) {
              const regex = pattern
                .replace(/[.+^${}()|[\]\\]/g, '\\$&')
                .replace(/\\\*\\\*/g, '§§')
                .replace(/\\\*/g, '[^/]*')
                .replace(/§§/g, '.*');
              return new RegExp(`(^|/)${regex}(/|$)`).test(filepath)
                  || new RegExp(`^${regex}$`).test(filepath);
            }

            const critical = [];
            const normal = [];

            for (const file of files) {
              let matched = false;

              // 경로 기반 매칭
              for (const rule of config.critical) {
                if (matchGlob(rule.pattern, file.filename)) {
                  critical.push({
                    file: file.filename,
                    domain: rule.domain,
                    reason: rule.reason,
                    status: file.status,
                    additions: file.additions,
                    deletions: file.deletions,
                  });
                  matched = true;
                  break;
                }
              }

              // 키워드 기반 매칭 (패치 내용 검사)
              if (!matched && file.patch && config.keywords) {
                for (const kw of config.keywords) {
                  if (new RegExp(kw.pattern, 'i').test(file.patch)) {
                    critical.push({
                      file: file.filename,
                      domain: 'keyword',
                      reason: kw.reason,
                      status: file.status,
                      additions: file.additions,
                      deletions: file.deletions,
                    });
                    matched = true;
                    break;
                  }
                }
              }

              if (!matched) {
                normal.push({
                  file: file.filename,
                  status: file.status,
                  additions: file.additions,
                  deletions: file.deletions,
                });
              }
            }

            // ── 3. 코멘트 생성 ──
            const statusIcon = { added: '\u{1F195}', modified: '\u270F\uFE0F', removed: '\u{1F5D1}\uFE0F', renamed: '\u{1F4DD}' };

            let body = '## \u{1F50D} 크리티컬 섹션 리뷰 분석\n\n';

            if (critical.length > 0) {
              body += `### \u{1F534} 크리티컬 \u2014 ${critical.length}개 파일 (개발자 리뷰 필요)\n\n`;
              body += '| 상태 | 파일 | 도메인 | 위험 사유 | +/- |\n';
              body += '|:----:|------|--------|----------|----:|\n';
              for (const c of critical) {
                const icon = statusIcon[c.status] || '\u{1F4C4}';
                body += `| ${icon} | \`${c.file}\` | **${c.domain}** | ${c.reason} | +${c.additions} -${c.deletions} |\n`;
              }
              body += '\n';
            } else {
              body += '### \u2705 크리티컬 섹션 변경 없음\n\n';
              body += '이 PR에는 크리티컬 섹션 변경이 없습니다. AI 리뷰만으로 충분합니다.\n\n';
            }

            if (normal.length > 0) {
              body += `### \u{1F7E2} 일반 섹션 \u2014 ${normal.length}개 파일 (AI 리뷰 충분)\n\n`;
              body += '<details>\n<summary>파일 목록 펼치기</summary>\n\n';
              body += '| 상태 | 파일 | +/- |\n';
              body += '|:----:|------|----:|\n';
              for (const n of normal) {
                const icon = statusIcon[n.status] || '\u{1F4C4}';
                body += `| ${icon} | \`${n.file}\` | +${n.additions} -${n.deletions} |\n`;
              }
              body += '\n</details>\n\n';
            }

            // 요약
            body += '---\n';
            if (critical.length > 0) {
              const domains = [...new Set(critical.map(c => c.domain))];
              body += `\u26A0\uFE0F **크리티컬 파일 ${critical.length}개** (${domains.join(', ')}) \u2014 위 파일을 직접 리뷰한 후 승인해 주세요.\n`;
            } else {
              body += '\u{1F49A} 크리티컬 변경 없음 \u2014 AI 리뷰 결과를 확인하고 머지하세요.\n';
            }
            body += '\n> 설정: `.github/critical-sections.yml`';

            // ── 4. 기존 코멘트 업데이트 or 새로 작성 ──
            const MARKER = '<!-- critical-section-review -->';
            body = `${MARKER}\n${body}`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c => c.body?.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            // ── 5. 라벨 관리 ──
            const LABEL = 'critical-review';
            try {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: LABEL,
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: LABEL,
                  color: 'e11d48',
                  description: '크리티컬 섹션 변경 포함 — 개발자 리뷰 필요',
                });
              }

              const currentLabels = (await github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              })).data.map(l => l.name);

              if (critical.length > 0 && !currentLabels.includes(LABEL)) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: [LABEL],
                });
              } else if (critical.length === 0 && currentLabels.includes(LABEL)) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: LABEL,
                });
              }
            } catch (e) {
              core.warning(`라벨 관리 실패: ${e.message}`);
            }

            // ── 6. 결과 요약 ──
            core.summary
              .addHeading('크리티컬 섹션 분석 결과')
              .addRaw(`크리티컬: ${critical.length}개 / 일반: ${normal.length}개`)
              .write();

            console.log(`분석 완료: 크리티컬 ${critical.length}개, 일반 ${normal.length}개`);
