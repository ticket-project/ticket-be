name: Backend CI/CD (Docker Hub)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

concurrency:
  group: deploy-ticket-be
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Build bootJar
        run: |
          chmod +x ./gradlew
          ./gradlew clean :core:core-api:bootJar -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ticket-be:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          source: "deploy/server/docker-compose.yml,deploy/server/nginx/nginx.conf"
          target: "/home/ubuntu/deploy-tmp"
          strip_components: 2

      - name: Deploy to Ubuntu server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            IMAGE="${{ secrets.DOCKER_USERNAME }}/ticket-be:latest"
            DEPLOY_DIR="/home/ubuntu"

            # Copy deploy files
            cp /home/ubuntu/deploy-tmp/docker-compose.yml $DEPLOY_DIR/docker-compose.yml
            mkdir -p $DEPLOY_DIR/nginx
            cp /home/ubuntu/deploy-tmp/nginx/nginx.conf $DEPLOY_DIR/nginx/nginx.conf
            rm -rf /home/ubuntu/deploy-tmp

            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              COMPOSE="docker compose"
            fi

            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            sudo docker pull "$IMAGE"
            sudo $COMPOSE -f $DEPLOY_DIR/docker-compose.yml down --remove-orphans || true
            sudo DOCKER_IMAGE="$IMAGE" $COMPOSE -f $DEPLOY_DIR/docker-compose.yml up -d --remove-orphans
            sudo docker image prune -f
