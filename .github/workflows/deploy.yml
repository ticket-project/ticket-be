name: Spring Boot CI/CD with Docker

# 1. 동작 조건: master 브랜치에 push 될 때 실행
on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # GitHub의 우분투 서버 빌려 쓰기

    steps:
      # 2. 코드 가져오기
      - name: Checkout Code
        uses: actions/checkout@v3

      # 3. JDK 설치
      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'temurin'

      # 4. Spring Boot 빌드
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test

      # 5. 도커 허브 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. 도커 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/backend:latest

      # 7. Ubuntu 서버에 접속해서 배포 (Pull & Run)
      - name: Deploy to Ubuntu Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_IP }}
          username: ubuntu # 서버 계정명 (ec2-user, ubuntu 등)
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 서버의 기존 이미지 최신화 및 컨테이너 재시작
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/backend:latest
            sudo docker-compose -f /home/ubuntu/docker-compose.yml up -d
