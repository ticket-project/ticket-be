name: Test & Architecture Validation

on:
  pull_request:
    branches: [ "master", "main" ]
    paths:
      - 'core/**'
      - 'storage/**'
      - 'support/**'
      - 'build.gradle'
      - 'settings.gradle'
  push:
    branches: [ "master" ]
    paths:
      - 'core/**'
      - 'storage/**'
      - 'support/**'

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Compile core-api
        run: ./gradlew :core:core-api:compileJava

      - name: Compile core-domain
        run: ./gradlew :core:core-domain:compileJava

  test:
    name: Architecture & Domain Tests
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Run core-domain tests
        run: ./gradlew :core:core-domain:test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: core/core-domain/build/reports/tests/
          retention-days: 7

  docs-validation:
    name: Documentation Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docs structure
        run: |
          EXIT_CODE=0

          # 필수 문서 존재 확인
          REQUIRED_FILES=(
            "CLAUDE.md"
            "docs/ARCHITECTURE.md"
            "docs/PRODUCT_SENSE.md"
            "docs/RELIABILITY.md"
            "docs/QUALITY_SCORE.md"
            "docs/design-docs/core-beliefs.md"
            "docs/exec-plans/README.md"
            "docs/references/domain-glossary.md"
          )

          echo "=== 필수 문서 존재 확인 ==="
          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "FAIL: $file 가 존재하지 않습니다"
              EXIT_CODE=1
            else
              echo "OK: $file"
            fi
          done

          # CLAUDE.md 200줄 이내 확인 (맵은 간결해야 한다)
          echo ""
          echo "=== CLAUDE.md 크기 확인 ==="
          LINE_COUNT=$(wc -l < CLAUDE.md)
          if [ "$LINE_COUNT" -gt 200 ]; then
            echo "WARN: CLAUDE.md가 ${LINE_COUNT}줄입니다 (권장 200줄 이내). 맵은 간결해야 합니다."
          else
            echo "OK: CLAUDE.md ${LINE_COUNT}줄"
          fi

          # docs/ 내 교차 링크 검증 (깨진 링크 탐지)
          echo ""
          echo "=== 교차 링크 검증 ==="
          for md_file in $(find docs -name "*.md" -type f); do
            # 마크다운 내 상대 링크 추출 후 존재 확인
            grep -oP '\[.*?\]\(\K[^)]+' "$md_file" 2>/dev/null | while read -r link; do
              # 외부 URL, 앵커 링크는 스킵
              if [[ "$link" == http* ]] || [[ "$link" == \#* ]]; then
                continue
              fi
              # docs/ 기준 상대 경로 해석
              DIR=$(dirname "$md_file")
              RESOLVED="$DIR/$link"
              if [ ! -f "$RESOLVED" ] && [ ! -d "$RESOLVED" ]; then
                echo "FAIL: $md_file 에서 깨진 링크: $link"
                EXIT_CODE=1
              fi
            done
          done

          # CLAUDE.md 내 docs/ 링크 검증
          echo ""
          echo "=== CLAUDE.md 링크 검증 ==="
          grep -oP '\[.*?\]\(\K[^)]+' CLAUDE.md 2>/dev/null | while read -r link; do
            if [[ "$link" == http* ]] || [[ "$link" == \#* ]]; then
              continue
            fi
            if [ ! -f "$link" ] && [ ! -d "$link" ]; then
              echo "FAIL: CLAUDE.md 에서 깨진 링크: $link"
              EXIT_CODE=1
            fi
          done

          if [ "$EXIT_CODE" -eq 0 ]; then
            echo ""
            echo "=== 모든 문서 검증 통과 ==="
          fi
          exit $EXIT_CODE
