name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            먼저 아래 문서를 순서대로 읽어 ticket 저장소의 리뷰 규칙과 도메인 맥락을 숙지하세요.
            1. AGENTS.md
            2. README_ARCHITECTURE.md
            3. .github/copilot-instructions.md
            4. .github/instructions/code-review.instructions.md
            5. .github/instructions/java-review.instructions.md

            그 다음 공식 code-review 플러그인을 실행합니다.
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            ## 리뷰 작성 규칙
            - 모든 출력은 한국어로 작성합니다.
            - 패치만 보지 말고 주변 코드, 관련 테스트, 설정, 호출 흐름을 함께 확인합니다.
            - `auth`, `hold`, `order`, `performanceseat`, `queue` 패키지는 가장 엄격하게 검토합니다.
            - 동시성, 트랜잭션 경계, 분산 락, Redis TTL 및 만료 처리, JWT 및 권한 체크를 우선 확인합니다.
            - 스타일 취향보다 실제 장애 시나리오, 회귀 위험, 테스트 공백을 우선 지적합니다.
            - 심각도 순서(CRITICAL → HIGH → MEDIUM → LOW)로 정리합니다.
            - 확신이 없는 지적은 "불확실"로 표시합니다. 과잉 확신은 금지합니다.
            - 요청 범위를 벗어난 리팩터링이나 기능 추가는 제안하지 않습니다.
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

