name: 리팩터링 / 구조 개선 제안 (구조화 폼)
description: 기능 추가가 아닌 코드 구조, 경계, 중복, 테스트성, 유지보수성을 개선하는 작업을 제안합니다.
title: "[Improvement] "
labels: ["refactoring", "needs-review"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        이 템플릿은 기능 추가 제안이 아니라 구조 개선, 기술 부채 상환, 테스트 가능성 향상을 위한 제안용입니다.

        이 저장소는 도메인 경계와 인프라 의존 방향을 중요하게 다룹니다.
        특히 모듈 경계나 `infra` 패키지, 락/Redis/WebSocket 흐름을 건드린다면 영향 범위와 검증 계획을 반드시 적어 주세요.

  - type: dropdown
    id: refactor_type
    attributes:
      label: 개선 유형
      description: 이번 제안의 중심이 무엇인지 선택해 주세요.
      options:
        - 중복 제거
        - 패키지/레이어 경계 정리
        - 테스트 가능성 향상
        - 성능 최적화
        - 기술 부채 상환
        - 가독성/이해도 개선
        - 운영 안정성 개선
        - 기타
    validations:
      required: true

  - type: dropdown
    id: affected_area
    attributes:
      label: 관련 영역
      description: 영향받는 기능이나 모듈을 모두 선택해 주세요.
      multiple: true
      options:
        - Auth / Member
        - Show / Performance
        - Seat / PerformanceSeat
        - Hold
        - Order
        - Queue
        - Redis / Expiration / Lock
        - WebSocket / Realtime
        - API / Controller / Security
        - Build / Deploy / Configuration
        - Database / Query
        - Logging / Monitoring
        - 기타
    validations:
      required: true

  - type: input
    id: target_scope
    attributes:
      label: 대상 경로 / 클래스 / 패키지
      description: 어디를 손보려는지 가능한 한 정확하게 적어 주세요.
      placeholder: core/core-domain/.../hold, StartOrderUseCase, com.ticket.core.infra.lock
    validations:
      required: true

  - type: textarea
    id: current_problem
    attributes:
      label: 현재 문제
      description: 지금 구조가 왜 문제인지, 실제로 어떤 비용을 만들고 있는지 적어 주세요.
      placeholder: |
        주문 종료 흐름이 스케줄러, Redis expiration listener, use case에 분산되어 있어
        수정 시 영향 범위를 빠르게 파악하기 어렵고 테스트도 복잡합니다.
    validations:
      required: true

  - type: textarea
    id: why_now
    attributes:
      label: 왜 지금 정리해야 하나
      description: 이번 시점에 이 개선이 필요한 이유를 적어 주세요.
      placeholder: |
        - 다음 스프린트에서 결제/주문 확장 예정
        - 현재 구조로는 변경 시 회귀 가능성이 큼
        - 운영 장애 대응 시 원인 추적 비용이 큼
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 개선 제안
      description: 어떻게 구조를 바꾸고 싶은지 적어 주세요.
      placeholder: |
        주문 종료 진입점을 하나의 use case로 수렴시키고,
        listener/scheduler는 그 use case를 호출하는 얇은 어댑터로 정리합니다.
    validations:
      required: true

  - type: textarea
    id: expected_effect
    attributes:
      label: 기대 효과
      description: 무엇이 좋아지는지 측정 가능하거나 비교 가능한 형태로 적어 주세요.
      placeholder: |
        - 주문 종료 로직 진입점 단일화
        - 테스트 케이스 작성 범위 축소
        - 장애 분석 시 확인해야 할 클래스 수 감소
    validations:
      required: true

  - type: textarea
    id: risk_and_tradeoff
    attributes:
      label: 리스크 / 트레이드오프
      description: 이 개선으로 생길 수 있는 부작용이나 주의할 점을 적어 주세요.
      placeholder: |
        - 이벤트 타이밍 차이로 기존 동작과 미세하게 달라질 수 있음
        - 구조는 좋아지지만 초기 변경 범위가 생각보다 넓어질 수 있음
    validations:
      required: true

  - type: textarea
    id: non_goals
    attributes:
      label: 하지 않을 일
      description: 이번 개선에서 제외할 항목을 적어 주세요.
      placeholder: |
        - 신규 API 추가
        - 결제 기능 도입
        - 화면/문서 전면 개편
    validations:
      required: false

  - type: dropdown
    id: impact_scope
    attributes:
      label: 영향 범위
      description: 예상되는 수정 범위를 선택해 주세요.
      options:
        - Small - 단일 클래스 또는 단일 흐름 중심
        - Medium - 하나의 도메인/모듈 내부
        - Large - 여러 도메인 또는 모듈 경계 영향
    validations:
      required: true

  - type: textarea
    id: validation_plan
    attributes:
      label: 검증 계획
      description: 어떤 테스트/검증으로 안전성을 확인할지 적어 주세요.
      placeholder: |
        - `:core:core-api:compileJava`
        - `:core:core-domain:test`
        - 관련 도메인 단위 테스트/통합 테스트
        - Redis expiration / scheduler 시나리오 재현
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 관련 이슈, PR, 클래스, 문서가 있으면 적어 주세요.
      placeholder: |
        - README_CODEX.md
        - CoreDomainArchitectureTest
        - 관련 PR / 운영 장애 기록
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 확인 사항
      options:
        - label: 이번 요청이 기능 추가가 아니라 구조 개선이라는 점을 확인했습니다.
          required: true
        - label: 영향 범위와 검증 계획을 작성했습니다.
          required: true
        - label: 모듈 경계/인프라 의존 방향에 미치는 영향을 검토했습니다.
          required: true
