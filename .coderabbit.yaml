# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: ko-KR
tone_instructions: >
  모든 리뷰, 요약, 제안은 한국어로 작성하세요.
  이 저장소는 에이전트가 리뷰 코멘트를 읽고 자동으로 수정하는 워크플로우를 사용합니다.


  **심각도 태그 필수**: 모든 인라인 코멘트 앞에 반드시 심각도 태그를 붙이세요.
  - `[P0-Bug]`: 버그, 데이터 손실, 보안 취약점 — 반드시 수정
  - `[P0-Arch]`: 아키텍처 위반 (모듈 경계, 인프라 격리 규칙) — 반드시 수정
  - `[P1-Concurrency]`: 동시성, 분산 락, TTL 정합성 문제 — 수정 권장
  - `[P1-Test]`: 테스트 누락, 기존 테스트와 불일치 — 수정 권장
  - `[P2-Suggestion]`: 설계 개선, 네이밍, 리팩터링 제안 — 판단 필요
  - `[P2-Style]`: 코드 스타일, 포맷팅 — 무시 가능


  **리뷰 기준 문서**: 이 저장소의 아키텍처 규칙과 설계 원칙은 다음 파일에 정의되어 있습니다.
  - `CLAUDE.md` — 전체 맵 (계층 규칙, 스킬, 검증 명령어)
  - `docs/ARCHITECTURE.md` — 모듈 의존 방향, 인프라 격리 규칙
  - `docs/RELIABILITY.md` — 분산 락, TTL, 트랜잭션 이벤트 규칙
  - `docs/design-docs/core-beliefs.md` — 8가지 핵심 설계 원칙


  P0/P1만 집중하고 P2는 최소한으로 남기세요.
  근거가 약한 코멘트는 남기지 말고, 재현 조건이나 실패 시나리오가 분명한 문제를 중심으로 리뷰하세요.
  스타일 취향 코멘트는 남기지 마세요.

reviews:
  profile: assertive
  high_level_summary: true
  high_level_summary_placeholder: "CodeRabbit PR 요약"
  review_status: true
  commit_status: true
  changed_files_summary: true
  sequence_diagrams: true
  collapse_walkthrough: false
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: false
  auto_apply_labels: false
  suggested_reviewers: false
  auto_assign_reviewers: false
  in_progress_fortune: true
  poem: false
  enable_prompt_for_ai_agents: true
  path_filters:
    - "**/*"
    - "!storage/images/**"
    - "!**/build/**"
    - "!.gradle/**"
    - "!.gradle-user-home/**"
    - "!.gradle-user-home-hold-fix/**"
    - "!.tmp/**"
    - "!mysql-data/**"
    - "!.idea/**"
    - "!.backup/**"
  path_instructions:
    - path: "core/core-api/**"
      instructions: |
        - 한국어로 리뷰. 모든 코멘트에 심각도 태그 [P0/P1/P2] 필수.
        - [P0-Arch] core-api에 비즈니스 규칙이나 직접 저장소 접근이 들어갔는지 확인. 규칙: docs/ARCHITECTURE.md#core-api-소유물
        - [P0-Bug] 인증/인가 누락, 공개 API 노출, 요청 검증 누락
        - [P1-Test] 컨트롤러 변경에 슬라이스/통합 테스트가 동반되었는지
        - P2 스타일 코멘트는 남기지 마세요.
    - path: "core/core-domain/**"
      instructions: |
        - 한국어로 리뷰. 모든 코멘트에 심각도 태그 [P0/P1/P2] 필수.
        - 가장 엄격하게 리뷰하세요.
        - [P0-Bug] 상태 전이 오류, 부분 저장, 이벤트 누락
        - [P0-Arch] infra 패키지 밖에서 Redisson/Redis/Messaging 직접 참조. 규칙: docs/ARCHITECTURE.md#인프라-격리-규칙
        - [P1-Concurrency] 분산 락 누락, TTL/expiration 불일치, 트랜잭션 경계 오류. 규칙: docs/RELIABILITY.md
        - [P1-Test] hold, order, queue 변경에 동시성 시나리오 테스트 동반 여부
    - path: "storage/redis-core/**"
      instructions: |
        - 한국어로 리뷰. 심각도 태그 필수.
        - [P1-Concurrency] Redis key 전략, TTL, connection 설정이 도메인 흐름과 충돌하지 않는지
    - path: ".github/**"
      instructions: |
        - 한국어로 리뷰. 심각도 태그 필수.
        - [P0-Bug] CI 실패, 보안 노출, 잘못된 자동화 동작
    - path: "docs/**"
      instructions: |
        - 한국어로 리뷰. 심각도 태그 필수.
        - [P1-Test] 문서 내용이 현재 코드와 일치하는지, 교차 링크가 유효한지 확인
    - path: "**/*"
      instructions: |
        - 한국어로 리뷰. 모든 코멘트에 심각도 태그 [P0/P1/P2] 필수.
        - P0/P1 위주로 리뷰. P2-Style은 남기지 마세요.
  tools:
    gitleaks:
      enabled: true
    sqlfluff:
      enabled: true
    checkov:
      enabled: true
    yamllint:
      enabled: true
    languagetool:
      enabled: true
      level: picky
  auto_review:
    enabled: true
    drafts: true
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 0
    ignore_title_keywords:
      - "WIP"
      - "[WIP]"
      - "[skip ai]"
      - "[skip review]"
    base_branches:
      - "master"
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  learnings:
    scope: auto
  issues:
    scope: local
  pull_requests:
    scope: local

code_generation:
  docstrings:
    language: ko-KR
    path_instructions:
      - path: "**/*"
        instructions: |
          - 문서와 기본 설명은 한국어로 작성하세요.
          - JavaDoc은 목적, 파라미터, 반환값, 예외를 명확히 적으세요.
  unit_tests:
    path_instructions:
      - path: "**/*"
        instructions: |
          - 새 분기나 회귀 위험이 있는 변경에는 테스트 제안을 적극적으로 포함하세요.
          - Controller는 통합 또는 슬라이스 테스트, 나머지는 단위 테스트를 우선 고려하세요.
