spring:
  config:
    import:
      - logging.yml
      - redis.yml
  http:
    serviceclient:
      kakao:
        base-url: https://kapi.kakao.com
        connect-timeout: 5s
        read-timeout: 3s
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email
            redirect-uri: "{baseUrl}/api/v1/auth/oauth2/callback/{registrationId}"
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/api/v1/auth/oauth2/callback/{registrationId}"
            scope:
              - profile_nickname
              - account_email
            client-name: Kakao
            provider: kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  sql:
    init:
      mode: never

server:
  forward-headers-strategy: framework

springdoc:
  use-fqn: true
  default-consumes-media-type: application/json;charset=UTF-8
  default-produces-media-type: application/json;charset=UTF-8

  api-docs:
    path: /api/api-docs
  swagger-ui:
    path: /api/swagger-ui.html
    enabled: true
    display-request-duration: true
    operations-sorter: alpha
    persist-authorization: true
    filter: true
    url: /api/api-docs

security:
  jwt:
    issuer: ticket
    secret-key: ${JWT_SECRET}
    access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS}
    refresh-token-expiration-seconds: ${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  seed:
    enabled: false
    batch-size: 500
  auth:
    public-base-url: ${APP_AUTH_PUBLIC_BASE_URL:http://localhost:8080}
    oauth2-success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI}
    oauth2-failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI}
    social-login:
      local-base-url: ${APP_AUTH_SOCIAL_LOGIN_LOCAL_BASE_URL:http://localhost:8080}
      prod-base-url: ${APP_AUTH_SOCIAL_LOGIN_PROD_BASE_URL:https://oneticket.site}
    kakao:
      admin-key: ${KAKAO_ADMIN_KEY}
  queue:
    enabled-by-default: true
    default-level: LEVEL_1
    default-max-active-users: 300
    default-entry-token-ttl: 10m
    entry-retention: 1h
