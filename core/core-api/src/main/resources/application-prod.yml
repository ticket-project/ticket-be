spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        use_sql_comments: true
        show_sql: false
decorator:
  datasource:
    p6spy:
      enable-logging: false

app:
  seed:
    enabled: false
  auth:
    oauth2-success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:https://oneticket.site/auth/callback}
    oauth2-failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI:https://oneticket.site/auth/callback}
