#:schema https://developers.openai.com/codex/config-schema.json

# Everything Claude Code (ECC) — Codex Reference Configuration
#
# Copy this file to ~/.codex/config.toml for global defaults, or keep it in
# the project root as .codex/config.toml for project-local settings.
#
# Official docs:
# - https://developers.openai.com/codex/config-reference
# - https://developers.openai.com/codex/multi-agent

# Model selection
# Leave `model` and `model_provider` unset so Codex CLI uses its current
# built-in defaults. Uncomment and pin them only if you intentionally want
# repo-local or global model overrides.

# Top-level runtime settings (current Codex schema)
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"

# External notifications receive a JSON payload on stdin.
notify = [
  "terminal-notifier",
  "-title", "Codex ECC",
  "-message", "Task completed!",
  "-sound", "default",
]

# Persistent instructions are appended to every prompt (additive, unlike
# model_instructions_file which replaces AGENTS.md).
persistent_instructions = "Follow project AGENTS.md guidelines. Use available MCP servers when they can help. For every pull request review, write in Korean and perform deep investigation by default: inspect surrounding code, related tests, module boundaries, transaction flows, Redis expiration behavior, concurrency, and regression risk before commenting."

# model_instructions_file replaces built-in instructions instead of AGENTS.md,
# so leave it unset unless you intentionally want a single override file.
# model_instructions_file = "/absolute/path/to/instructions.md"

# MCP servers
# Keep the default project set lean. API-backed servers inherit credentials from
# the launching environment or can be supplied by a user-level ~/.codex/config.toml.
[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
startup_timeout_sec = 30

[mcp_servers.context7]
command = "npx"
# Canonical Codex section name is `context7`; the package itself remains
# `@upstash/context7-mcp`.
args = ["-y", "@upstash/context7-mcp@latest"]
startup_timeout_sec = 30

[mcp_servers.exa]
url = "https://mcp.exa.ai/mcp"

[mcp_servers.memory]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]
startup_timeout_sec = 30

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest", "--extension"]
startup_timeout_sec = 30

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
startup_timeout_sec = 30

# Additional MCP servers (uncomment as needed):
# [mcp_servers.supabase]
# command = "npx"
# args = ["-y", "supabase-mcp-server@latest", "--read-only"]
#
# [mcp_servers.firecrawl]
# command = "npx"
# args = ["-y", "firecrawl-mcp"]
#
# [mcp_servers.fal-ai]
# command = "npx"
# args = ["-y", "fal-ai-mcp-server"]
#
# [mcp_servers.cloudflare]
# command = "npx"
# args = ["-y", "@cloudflare/mcp-server-cloudflare"]

[features]
# Codex multi-agent collaboration is stable and on by default in current builds.
# Keep the explicit toggle here so the repo documents its expectation clearly.
multi_agent = true

# Profiles — switch with `codex -p <name>`
[profiles.strict]
approval_policy = "on-request"
sandbox_mode = "read-only"
web_search = "cached"

[profiles.yolo]
approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "live"

[agents]
# Multi-agent role limits and local role definitions.
# These map to `.codex/agents/*.toml` and mirror the repo's explorer/reviewer/docs workflow.
max_threads = 12
max_depth = 2

[agents.explorer]
description = "Read-only codebase explorer for gathering evidence before changes are proposed."
config_file = "agents/explorer.toml"

[agents.docs_researcher]
description = "Documentation specialist that verifies APIs, framework behavior, and release notes."
config_file = "agents/docs-researcher.toml"

[agents.planner]
description = "Implementation planning specialist for complex features and refactors."
config_file = "agents/planner.toml"

[agents.architect]
description = "Architecture specialist focused on design boundaries, scalability, and tradeoffs."
config_file = "agents/architect.toml"

[agents."tdd-guide"]
description = "Test-driven development specialist for new features, fixes, and safe refactors."
config_file = "agents/tdd-guide.toml"

[agents."code-reviewer"]
description = "Default always-on PR reviewer that performs deep investigation on correctness, regression risk, concurrency, and test gaps."
config_file = "agents/code-reviewer.toml"

[agents."security-reviewer"]
description = "Security reviewer focused on vulnerabilities, secrets, and unsafe patterns."
config_file = "agents/security-reviewer.toml"

[agents."build-error-resolver"]
description = "Build and type error resolver that fixes failures incrementally."
config_file = "agents/build-error-resolver.toml"

[agents."docs-lookup"]
description = "Documentation lookup specialist for API references and framework behavior."
config_file = "agents/docs-lookup.toml"

[agents."java-reviewer"]
description = "Java and Spring Boot PR reviewer that performs deep investigation on correctness, transactions, Redis/lock safety, and test gaps."
config_file = "agents/java-reviewer.toml"

[agents."java-build-resolver"]
description = "Java and Gradle/Maven build resolver for compile, dependency, and test failures."
config_file = "agents/java-build-resolver.toml"

[agents."database-reviewer"]
description = "Database reviewer focused on schema design, queries, transactions, and performance."
config_file = "agents/database-reviewer.toml"

[agents."e2e-runner"]
description = "End-to-end testing specialist for critical user flows and flaky scenario fixes."
config_file = "agents/e2e-runner.toml"

[agents."refactor-cleaner"]
description = "Refactoring specialist for dead code cleanup, duplication removal, and safer structure."
config_file = "agents/refactor-cleaner.toml"

[agents."doc-updater"]
description = "Documentation updater for runbooks, codemaps, and behavior-aligned docs."
config_file = "agents/doc-updater.toml"

[agents."performance-optimizer"]
description = "Performance analysis and optimization specialist for bottlenecks, memory, and runtime efficiency."
config_file = "agents/performance-optimizer.toml"

[agents."chief-of-staff"]
description = "Communication specialist for drafts, triage, summaries, and stakeholder messaging."
config_file = "agents/chief-of-staff.toml"

[agents."loop-operator"]
description = "Autonomous loop operator that monitors progress, stalls, and retry conditions."
config_file = "agents/loop-operator.toml"

[agents."harness-optimizer"]
description = "Harness optimizer for reliability, context budget, and tool configuration tuning."
config_file = "agents/harness-optimizer.toml"
