[config]
response_language = "ko-KR"
ignore_pr_title = ["^WIP", "^\\[WIP\\]", "^\\[skip qodo\\]"]
ignore_pr_labels = ["skip-qodo", "skip-ai-review"]
allow_only_specific_folders = ["core", "storage", "support", ".github"]
patch_extra_lines_before = 8
patch_extra_lines_after = 5

[github_app]
pr_commands = ["/agentic_describe", "/agentic_review"]

[ignore]
glob = [
  "storage/images/**",
  "**/build/**",
  ".gradle/**",
  ".gradle-user-home/**",
  ".gradle-user-home-hold-fix/**",
  ".tmp/**",
  "mysql-data/**",
  ".idea/**",
  ".backup/**"
]

[pr_reviewer]
require_score_review = true
require_tests_review = true
require_estimate_effort_to_review = true
extra_instructions = """\
- 모든 요약, 리뷰, 제안은 한국어로 작성하세요.
- 이 저장소는 에이전트가 리뷰를 읽고 자동 수정하는 워크플로우를 사용합니다.

**심각도 태그 필수**: 모든 이슈/코멘트 앞에 심각도 태그를 붙이세요.
  - [P0-Bug]: 버그, 데이터 손실, 보안 — 반드시 수정
  - [P0-Arch]: 아키텍처 위반 (모듈 경계, 인프라 격리) — 반드시 수정
  - [P1-Concurrency]: 동시성, 분산 락, TTL 정합성 — 수정 권장
  - [P1-Test]: 테스트 누락/불일치 — 수정 권장
  - [P2-Suggestion]: 개선 제안 — 판단 필요
  P2-Style (순수 스타일) 코멘트는 남기지 마세요.

**아키텍처 규칙 참조**: docs/ARCHITECTURE.md, docs/RELIABILITY.md, docs/design-docs/core-beliefs.md
- core-api에 비즈니스 규칙 → [P0-Arch]
- infra 밖에서 Redisson/Redis 직접 참조 → [P0-Arch]
- 분산 락 누락, TTL 불일치 → [P1-Concurrency]

P0/P1 위주로 리뷰하고, 근거가 약한 지적은 남기지 마세요.
"""

[review_agent]
comments_location_policy = "both"
inline_comments_severity_threshold = 1
issues_user_guidelines = """\
리뷰는 한국어로 작성하세요.
모든 이슈 앞에 심각도 태그 [P0-Bug], [P0-Arch], [P1-Concurrency], [P1-Test], [P2-Suggestion] 중 하나를 붙이세요.
P2-Style 코멘트는 남기지 마세요.
문제 제기 시 왜 문제가 되는지, 어떤 조건에서 깨지는지, 어떻게 수정하면 되는지 짧게 설명하세요.
수정 방향이 명확하면 코드 제안도 함께 포함하세요.
"""
compliance_user_guidelines = """\
리뷰는 한국어로 작성하세요.
이 저장소의 규칙 (상세: CLAUDE.md, docs/ARCHITECTURE.md, docs/RELIABILITY.md):
- 문서와 기본 응답은 한국어
- 변경은 수술적으로, 요청 범위만 수정
- 단순함 우선, 불필요한 추상화 금지
- core-api는 진입점/설정, core-domain은 비즈니스 규칙
- Redisson/Redis/Messaging은 infra 패키지에서만 사용
- 분산 락 규칙, TTL 정합성은 docs/RELIABILITY.md 참조
- 설계 원칙은 docs/design-docs/core-beliefs.md 참조
"""

[pr_code_suggestions]
enable_chat_in_code_suggestions = true
